services:
  app:
    build: .
    container_name: minecraft-wiki-api
    restart: unless-stopped
    network_mode: host
    environment:
      - NODE_ENV=production
      - LOG_CONSOLE=true
      - LOG_FILE=${LOG_FILE:-false}
      - AUTO_PORT=${AUTO_PORT:-false}
      - API_KEY=${API_KEY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=localhost,127.0.0.1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  mcp:
    build: ./mcp-server
    container_name: minecraft-wiki-mcp
    restart: unless-stopped
    network_mode: host
    environment:
      - API_BASE_URL=http://localhost:3000
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('127.0.0.1',3001)); s.close()"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
